name: Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  scripts-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run local checks
        run: scripts/check --require-shellcheck
